<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Add Book</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#f4f6f9;
}

/* Navbar */

.navbar{
    background:#2c3e50;
    color:white;
    padding:18px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.navbar h1{
    font-size:24px;
}

.navbar a{
    color:white;
    text-decoration:none;
    margin-left:20px;
    font-size:16px;
}

/* Main container */

.container{
    width:400px;
    margin:70px auto;
    background:white;
    padding:35px;
    border-radius:8px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

/* Title */

.container h2{
    text-align:center;
    margin-bottom:20px;
    color:#333;
}

/* Form fields */

label{
    font-weight:bold;
}

input{
    width:100%;
    padding:10px;
    margin-top:8px;
    margin-bottom:18px;
    border:1px solid #ccc;
    border-radius:5px;
}

/* Button */

button{
    width:100%;
    padding:12px;
    background:#3498db;
    color:white;
    border:none;
    font-size:16px;
    border-radius:6px;
    cursor:pointer;
}

button:hover{
    background:#2980b9;
}

/* Back link */

.back{
    display:block;
    margin-top:15px;
    text-align:center;
    text-decoration:none;
    color:#3498db;
}

</style>

</head>

<body>

<!-- Navbar -->

<div class="navbar">
<h1>Book Management System</h1>

<div>
<a th:href="@{/}">Home</a>
<a th:href="@{/viewBooks}">Books</a>
<a th:href="@{/addBook}">Add Book</a>
</div>

</div>

<!-- Form Container -->

<div class="container">

<h2>Add New Book</h2>

<form th:action="@{/saveBook}" method="post">

<label>Book Name</label>
<input type="text" name="bname" placeholder="Enter Book Name" required>

<label>Book Price</label>
<input type="text" name="bprice" placeholder="Enter Book Price" required>

<button type="submit">Add Book</button>

</form>

<a th:href="@{/viewBooks}" class="back">← Back to Book List</a>

</div>

</body>
</html>
