<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Book Management System</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#f4f6f9;
}

/* Navbar */

.navbar{
    background:#2c3e50;
    color:white;
    padding:18px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.navbar h1{
    font-size:24px;
}

.navbar a{
    color:white;
    text-decoration:none;
    margin-left:20px;
    font-size:16px;
}

/* Main container */

.container{
    width:80%;
    margin:40px auto;
    background:white;
    padding:30px;
    border-radius:8px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

/* Header */

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
}

.header h2{
    color:#333;
}

/* Buttons */

.btn{
    padding:10px 18px;
    border-radius:5px;
    text-decoration:none;
    color:white;
    font-size:14px;
}

.add-btn{
    background:#3498db;
}

.add-btn:hover{
    background:#2980b9;
}

.edit-btn{
    background:#27ae60;
}

.edit-btn:hover{
    background:#1e8449;
}

.delete-btn{
    background:#e74c3c;
}

.delete-btn:hover{
    background:#c0392b;
}

/* Table */

table{
    width:100%;
    border-collapse:collapse;
}

th, td{
    padding:12px;
    text-align:center;
    border-bottom:1px solid #ddd;
}

th{
    background:#3498db;
    color:white;
}

tr:hover{
    background:#f1f1f1;
}

</style>

</head>

<body>

<!-- Navbar -->

<div class="navbar">
<h1>Book Management System</h1>

<div>
<a th:href="@{/}">Home</a>
</div>

</div>

<!-- Main Container -->

<div class="container">

<div class="header">
<h2>All Books</h2>
<a th:href="@{/addBook}" class="btn add-btn">+ Add Book</a>
</div>

<table>

<tr>
<th>ID</th>
<th>Book Name</th>
<th>Price</th>
<th>Actions</th>
</tr>

<tr th:each="book : ${books}">

<td th:text="${book.bid}"></td>
<td th:text="${book.bname}"></td>
<td th:text="${book.bprice}"></td>

<td>

<a th:href="@{/editBook/{id}(id=${book.bid})}" class="btn edit-btn">
Edit
</a>

<a th:href="@{/deleteBook/{id}(id=${book.bid})}" class="btn delete-btn">
Delete
</a>

</td>

</tr>

</table>

</div>

</body>
</html>
